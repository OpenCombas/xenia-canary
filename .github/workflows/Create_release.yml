name: Create Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Full commit SHA for tagging'
        required: true
        type: string
      branch:
        description: 'Branch name used as release tag suffix (e.g. xenia_netplay_opencombas)'
        required: false
        type: string
        default: 'xenia_netplay_opencombas'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout for git log access — no submodules needed
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          FULL_SHA="${{ inputs.tag }}"
          SHORT_SHA="${FULL_SHA::7}"
          BRANCH="${{ inputs.branch }}"
          TAG_NAME="${SHORT_SHA}"
          TITLE="${SHORT_SHA}_${BRANCH}"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(gh release list \
            --repo "${REPO}" \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName' 2>/dev/null || echo "")

          if [ -n "${PREV_TAG}" ]; then
            PREV_SHA=$(git rev-parse "${PREV_TAG}^{}" 2>/dev/null || \
                       git rev-parse "${PREV_TAG}" 2>/dev/null || echo "")
          fi

          if [ -n "${PREV_SHA}" ]; then
            COMMITS=$(git log --format="- %s (\`%h\`)" --abbrev=7 "${PREV_SHA}..${FULL_SHA}" --)
            COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG_NAME}"
          else
            COMMITS=$(git log --format="- %s (\`%h\`)" --abbrev=7 -1 "${FULL_SHA}" --)
            COMPARE_URL=""
          fi

          # Assemble body
          {
            echo "body<<RELEASE_BODY_EOF"

            if [ -n "${COMMITS}" ]; then
              echo "### Changes"
              echo ""
              echo "${COMMITS}"
            fi

            if [ -n "${COMPARE_URL}" ]; then
              echo ""
              echo "**Full changelog**: ${COMPARE_URL}"
            fi

            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      # --- Download artifacts only for platforms that succeeded ---

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: xenia_canary_netplay_windows
          path: artifacts/xenia

      # - name: Download Linux artifacts
      #   uses: actions/download-artifact@v8
      #   with:
      #     name: xenia_canary_linux
      #     path: artifacts/linux

      # Uncomment when platforms are enabled:
      # - name: Download macOS artifacts
      #   uses: actions/download-artifact@v8
      #   with:
      #     name: xenia_canary_macos
      #     path: artifacts/macos

      # - name: Download Android artifacts
      #   uses: actions/download-artifact@v8
      #   with:
      #     name: xenia_canary_android
      #     path: artifacts/android

      # --- Package everything into release assets ---

      - name: Package release assets
        run: |
          mkdir -p release_assets

          # Windows
          if [ -d "artifacts/xenia" ]; then
            cd artifacts/xenia
            zip -r ../../../release_assets/xenia.zip . -x "*.pdb"
            cd ../../..
          fi

          echo "=== Release assets ==="
          ls -lh release_assets/

      # --- Create the release ---

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.notes.outputs.tag_name }}
          TITLE: ${{ steps.notes.outputs.title }}
          BODY: ${{ steps.notes.outputs.body }}
          TARGET: ${{ inputs.tag }}
        run: |
          echo "${BODY}" > release_notes.md
          echo "Creating release: ${TAG}"

          # Check if tag/release already exists (re-run safety)
          if gh release view "${TAG}" --repo "${REPO}" --json tagName 2>/dev/null; then
            echo "Release ${TAG} exists, uploading new assets..."
            gh release upload "${TAG}" \
              --repo "${REPO}" \
              --clobber \
              release_assets/*
          else
            gh release create "${TAG}" \
              --repo "${REPO}" \
              --target "${{ inputs.tag }}" \
              --title "${TITLE}" \
              --notes-file release_notes.md \
              --latest \
              release_assets/*
          fi

          echo "✅ Release ${TAG} published"
